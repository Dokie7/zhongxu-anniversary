<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>中旭十周年庆 · 盛泽中旭验车</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #c7000b;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(255,215,0,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.1) 0%, transparent 50%);
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 16px 16px 40px;
        }

        /* ===== Header ===== */
        .header {
            text-align: center;
            padding: 24px 0 6px;
        }
        .ten-year-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f5d100, #ff8c00);
            color: #8b0000;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 18px;
            border-radius: 20px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .main-title {
            font-size: 38px;
            font-weight: 900;
            color: #fff6d5;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3), 0 4px 0 #a00008;
            letter-spacing: 6px;
            line-height: 1.2;
        }
        .sub-title {
            font-size: 18px;
            color: #ffd966;
            font-weight: 600;
            letter-spacing: 4px;
            margin-top: 6px;
        }
        .deco-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            margin: 12px auto;
            border-radius: 2px;
        }

        /* ===== Card ===== */
        .card {
            background: linear-gradient(180deg, #fffcf0 0%, #fff8e1 100%);
            border-radius: 16px;
            padding: 24px 20px;
            margin: 14px 0;
            box-shadow: 0 6px 30px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #c7000b, #ffd700, #c7000b);
        }
        .card-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #8b0000;
            margin-bottom: 16px;
        }
        .card-title small {
            display: block;
            font-size: 13px;
            font-weight: 400;
            color: #888;
            margin-top: 4px;
        }

        /* ===== Price Items ===== */
        .price-item {
            background: #fff;
            border: 2px solid #f0e6cc;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .price-item:last-child { margin-bottom: 0; }
        .price-item .label {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .price-item .label .tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            background: #c7000b;
            padding: 2px 7px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
        }
        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .price-old {
            font-size: 16px;
            color: #999;
            text-decoration: line-through;
        }
        .price-new {
            font-size: 28px;
            font-weight: 900;
            color: #c7000b;
        }
        .price-new .unit {
            font-size: 13px;
            font-weight: 400;
            color: #888;
            margin-left: 2px;
        }

        /* ===== Info ===== */
        .info-list {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 12px;
            padding: 12px 16px;
            margin: 12px 0;
            color: #fff6d5;
            font-size: 14px;
            line-height: 2.2;
        }
        .info-list .row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .info-list .row .ico { flex-shrink: 0; }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 16px 0 8px;
            color: #fff6d5;
            font-size: 12px;
            line-height: 2;
        }

        @media (max-width: 400px) {
            .main-title { font-size: 30px; letter-spacing: 4px; }
            .sub-title { font-size: 16px; }
            .price-new { font-size: 24px; }
            .info-list { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            <div class="ten-year-badge">
                🎉 十年匠心 · 感恩回馈 🎉
            </div>
            <h1 class="main-title">中旭十周年庆</h1>
            <div class="sub-title">盛泽中旭验车</div>
            <div class="deco-line"></div>
        </div>

        <!-- Price Card -->
        <div class="card">
            <div class="card-title">
                🚗 车辆检测费调整
                <small>活动时间：即日起至另行通知</small>
            </div>
            <div class="price-item">
                <div class="label">
                    ⛽ 燃油类小型客车 · 面包车
                    <span class="tag">热销</span>
                </div>
                <div class="price-row">
                    <span class="price-old">原价 ¥360</span>
                    <span class="price-new">¥280<span class="unit">/辆</span></span>
                </div>
            </div>
            <div class="price-item">
                <div class="label">
                    🔋 纯电动小型客车 · 面包车
                    <span class="tag">环保</span>
                </div>
                <div class="price-row">
                    <span class="price-old">原价 ¥280</span>
                    <span class="price-new">¥200<span class="unit">/辆</span></span>
                </div>
            </div>
        </div>

        <!-- Info - Three rows -->
        <div class="info-list">
            <div class="row"><span class="ico">🕐</span> 周一至周六 8:00-17:00</div>
            <div class="row"><span class="ico">📞</span> 0512-63138666</div>
            <div class="row"><span class="ico">📋</span> 请携带行驶证、有效证件到场办理</div>
        </div>

        <!-- Footer -->
        <div class="footer">
            本活动最终解释权归盛泽中旭验车所有<br>
            如有疑问请致电咨询
        </div>
    </div>
</body>
</html>
